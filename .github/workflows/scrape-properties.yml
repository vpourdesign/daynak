name: Scraper propriétés RE/MAX

on:
  schedule:
    # Tous les jours à 6h00 heure de Montréal (UTC-5 en hiver = 11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permet aussi de lancer manuellement depuis GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    # Nécessaire pour que le bot puisse committer et pousser vers GitHub
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Installation des dépendances système pour Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2 libpango-1.0-0 libpangocairo-1.0-0 libnss3 \
            libnspr4 libx11-xcb1 libxcb-dri3-0

      - name: Exécution du scraper
        run: node scrape.js

      - name: Commit et push de proprietes.html si changé
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proprietes.html
          if git diff --staged --quiet; then
            echo "Aucun changement détecté dans proprietes.html"
          else
            git commit -m "chore: mise à jour automatique des propriétés ($(date -u +'%Y-%m-%d'))"
            git push
          fi
